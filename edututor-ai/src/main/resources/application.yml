server:
  port: 8080

spring:
  application:
    name: edututor-ai

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen2.5:7b
        options:
          temperature: 0.7
          top-k: 40
          top-p: 0.9
    embedding:
      type: ollama
      ollama:
        model: nomic-embed-text

  datasource:
    url: jdbc:postgresql://localhost:5432/edututor
    username: edututor
    password: edututor2024
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

logging:
  level:
    com.edututor: DEBUG
    org.springframework.ai: INFO
    org.springframework.jdbc: INFO

---
spring:
  config:
    activate:
      on-profile: dev

  ai:
    ollama:
      base-url: http://localhost:11434
    embedding:
      ollama:
        model: nomic-embed-text
